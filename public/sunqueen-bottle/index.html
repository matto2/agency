<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Manual Spinning Label (Cylinder)</title>
<style>
  html,body{height:100%;margin:0;background:#000;overflow:hidden;font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;}
  #app{position:fixed;inset:0;}
  .uiTop,.uiBot{position:fixed;left:16px;right:16px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;}
  .uiTop{top:16px;pointer-events:none}
  .uiBot{bottom:16px;pointer-events:none}
  .pill{pointer-events:none;display:inline-flex;align-items:center;gap:8px;padding:10px 12px;border-radius:999px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);color:rgba(255,255,255,.92);backdrop-filter:blur(10px);font-size:13px;box-shadow:0 12px 30px rgba(0,0,0,.35);white-space:nowrap}
  .btns{display:flex;gap:10px;flex-wrap:wrap;pointer-events:auto;align-items:center}
  button{appearance:none;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.10);color:rgba(255,255,255,.95);border-radius:12px;padding:10px 12px;font-weight:650;font-size:14px;cursor:pointer;transition:transform .06s ease, background .15s ease, border-color .15s ease;}
  button:hover{background:rgba(255,255,255,.14);border-color:rgba(255,255,255,.26)}
  button:active{transform:translateY(1px)}
</style>
</head>
<body>
<div id="app"></div>

<div class="uiTop">
  <div class="pill">Drag to rotate • Wheel/pinch to zoom • No autoplay</div>
  <div class="btns">
    <button id="reset" type="button">Reset</button>
  </div>
</div>

<div class="uiBot">
  <div class="pill" id="status">Loading…</div>
  <div class="btns">
    <button id="nudgeL" type="button">Label ◀</button>
    <button id="nudgeR" type="button">Label ▶</button>
    <div class="pill" id="offsetPill">Offset: 0.000</div>
  </div>
</div>

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x000000);

  const camera = new THREE.PerspectiveCamera(35, window.innerWidth/window.innerHeight, 0.1, 4000);

  // Lighting
  scene.add(new THREE.AmbientLight(0xffffff, 1.1));
  const key = new THREE.DirectionalLight(0xffffff, 1.8);
  key.position.set(250, 260, 220);
  scene.add(key);
  const rim = new THREE.DirectionalLight(0xffffff, 0.6);
  rim.position.set(-260, 120, -220);
  scene.add(rim);

  // Cylinder label only
  const group = new THREE.Group();
  scene.add(group);

  const loader = new THREE.TextureLoader();
  const tex = loader.load(
    LABEL_URL,
    () => statusEl.textContent = "Ready",
    undefined,
    () => statusEl.textContent = "Label failed to decode"
  );
  tex.colorSpace = THREE.SRGBColorSpace;
  tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
  tex.wrapS = THREE.RepeatWrapping;
  tex.wrapT = THREE.ClampToEdgeWrapping;
  tex.repeat.set(1, 1);
  tex.flipY = true;

  let labelOffset = 0.25;
  const NUDGE = 0.01;
  const setOffset = (v) => {
    labelOffset = (v % 1 + 1) % 1;
    tex.offset.x = labelOffset;
    offsetPill.textContent = `Offset: ${labelOffset.toFixed(3)}`;
  };
  setOffset(labelOffset);
  nudgeL.addEventListener('click', () => setOffset(labelOffset - NUDGE));
  nudgeR.addEventListener('click', () => setOffset(labelOffset + NUDGE));

  const mat = new THREE.MeshPhysicalMaterial({
    map: tex,
    roughness: 0.28,
    metalness: 0.0,
    clearcoat: 0.12,
    clearcoatRoughness: 0.35,
    side: THREE.DoubleSide
  });

  const R = 120;
  const H = 520;
  const geo = new THREE.CylinderGeometry(R, R, H, 384, 1, true);
  const cyl = new THREE.Mesh(geo, mat);
  group.add(cyl);

  group.rotation.y = 0.35;
  group.rotation.x = -0.05;

  // Fit camera so full label is visible
  function fit(padding=1.18) {
    const box = new THREE.Box3().setFromObject(group);
    const size = box.getSize(new THREE.Vector3());
    const center = box.getCenter(new THREE.Vector3());
    const maxSize = Math.max(size.x, size.y, size.z);
    const fitHeightDistance = maxSize / (2 * Math.tan(THREE.MathUtils.degToRad(camera.fov * 0.5)));
    const fitWidthDistance = fitHeightDistance / camera.aspect;
    const distance = padding * Math.max(fitHeightDistance, fitWidthDistance);
    const dir = new THREE.Vector3(0, 0.08, 1).normalize();
    camera.position.copy(center).add(dir.multiplyScalar(distance));
    camera.near = distance / 100;
    camera.far = distance * 100;
    camera.updateProjectionMatrix();
    camera.lookAt(center);
  }
  fit();

  // Interaction: drag spin (no inertia, no autoplay)
  let dragging = false;
  let lastX = 0, lastY = 0;

  const clamp = (v,min,max) => Math.max(min, Math.min(max, v));

  renderer.domElement.addEventListener('pointerdown', (e) => {
    dragging = true;
    lastX = e.clientX;
    lastY = e.clientY;
    renderer.domElement.setPointerCapture(e.pointerId);
  });

  renderer.domElement.addEventListener('pointermove', (e) => {
    if (!dragging) return;
    const dx = e.clientX - lastX;
    const dy = e.clientY - lastY;
    lastX = e.clientX;
    lastY = e.clientY;

    group.rotation.y += dx * 0.01;
    group.rotation.x = clamp(group.rotation.x + (-dy * 0.004), -0.22, 0.10);
  });

  const stopDrag = () => dragging = false;
  renderer.domElement.addEventListener('pointerup', stopDrag);
  renderer.domElement.addEventListener('pointercancel', stopDrag);
  renderer.domElement.addEventListener('pointerleave', stopDrag);

  // Zoom along view direction
  function zoom(delta) {
    const v = new THREE.Vector3();
    camera.getWorldDirection(v);
    camera.position.addScaledVector(v, delta);
  }
  renderer.domElement.addEventListener('wheel', (e) => {
    e.preventDefault();
    zoom((e.deltaY > 0) ? 28 : -28);
  }, { passive:false });

  resetBtn.addEventListener('click', () => {
    group.rotation.set(-0.05, 0.35, 0);
    setOffset(0.25);
    fit();
  });

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
    fit();
  });

  function tick() {
    requestAnimationFrame(tick);
    renderer.render(scene, camera);
  }
  tick();
})();
</script>
</body>
</html>
